<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Shortly - URL Shortener</title>

    <meta
      name="description"
      content="Create short URLs instantly. Track clicks, generate QR codes, and manage your links easily."
    />
    <meta
      name="keywords"
      content="url shortener, link shortener, qr code generator, shorten link, analytics"
    />
    <meta name="author" content="Chandril" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook) -->
    <meta property="og:title" content="Shortly - URL Shortener" />
    <meta
      property="og:description"
      content="Shorten links, track analytics, and generate QR codes in seconds."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta
      property="og:image"
      content="https://yourdomain.com/preview.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shortly - URL Shortener" />
    <meta
      name="twitter:description"
      content="Fast and simple URL shortener with analytics."
    />
    <meta
      name="twitter:image"
      content="https://yourdomain.com/preview.png"
    />

    <!-- Fonts (optional, clean UI) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
